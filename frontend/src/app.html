<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1a1a" />
    <!-- Schriften werden lokal via @fontsource geladen (siehe +layout.svelte) —
         bewusst kein Google-Fonts-CDN: kein externer Request, kein IP-Abfluss. -->
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
